<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🐍 Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
    --green: #39ff14;
    --green-dim: #1a7a08;
    --red: #ff3860;
    --gold: #ffd700;
    --text: #c0c0d0;
    --grid: #0f0f18;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'Press Start 2P', monospace;
    color: var(--text);
    touch-action: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 8px;
    gap: 6px;
  }

  /* ─── HEADER ─── */
  header {
    width: 100%;
    max-width: 400px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
  }

  .score-block { text-align: center; }
  .score-label { font-size: 6px; color: #666; margin-bottom: 3px; }
  .score-value { font-size: 13px; color: var(--green); }
  #best-score { color: var(--gold); }
  #level-val  { color: #a78bfa; }

  /* ─── CANVAS WRAPPER ─── */
  #canvas-wrap {
    position: relative;
    border: 2px solid var(--green-dim);
    border-radius: 4px;
    box-shadow: 0 0 18px rgba(57,255,20,0.15), inset 0 0 30px rgba(0,0,0,0.6);
    overflow: hidden;
    flex-shrink: 0;
  }

  canvas { display: block; background: var(--grid); }

  /* scanlines overlay */
  #canvas-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
  }

  /* ─── OVERLAY (start / pause / game-over) ─── */
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.78);
    gap: 14px;
    transition: opacity .25s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay h1 { font-size: 22px; color: var(--green); text-shadow: 0 0 12px var(--green); }
  #overlay p  { font-size: 8px; color: var(--text); text-align: center; line-height: 1.8; }
  #overlay .final-score { font-size: 14px; color: var(--gold); }

  .btn {
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    text-shadow: 0 0 6px var(--green);
    box-shadow: 0 0 8px rgba(57,255,20,0.3);
    transition: background .15s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: rgba(57,255,20,0.15); transform: scale(0.96); }

  /* ─── D-PAD ─── */
  #dpad {
    display: grid;
    grid-template-columns: repeat(3, 52px);
    grid-template-rows: repeat(3, 52px);
    gap: 4px;
    flex-shrink: 0;
  }

  .dpad-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    transition: background .1s, transform .1s;
    touch-action: none;
  }
  .dpad-btn:active, .dpad-btn.pressed {
    background: rgba(57,255,20,0.12);
    border-color: var(--green-dim);
    transform: scale(0.93);
  }
  .dpad-center {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; color: #444;
  }

  /* ─── PAUSE BTN ─── */
  #pause-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    width: 32px; height: 32px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="score-block">
    <div class="score-label">SCORE</div>
    <div class="score-value" id="score">0</div>
  </div>
  <div class="score-block">
    <div class="score-label">BEST</div>
    <div class="score-value" id="best-score">0</div>
  </div>
  <div class="score-block">
    <div class="score-label">LEVEL</div>
    <div class="score-value" id="level-val">1</div>
  </div>
</header>

<!-- CANVAS -->
<div id="canvas-wrap">
  <canvas id="game"></canvas>
  <button id="pause-btn">⏸</button>

  <div id="overlay">
    <h1 id="ov-title">SNAKE</h1>
    <p id="ov-msg">Desliza o usa el D-Pad<br>para mover la serpiente</p>
    <div class="final-score" id="ov-score" style="display:none"></div>
    <button class="btn" id="ov-btn">JUGAR</button>
  </div>
</div>

<!-- D-PAD -->
<div id="dpad">
  <div></div>
  <div class="dpad-btn" id="btn-up">▲</div>
  <div></div>

  <div class="dpad-btn" id="btn-left">◀</div>
  <div class="dpad-center">✦</div>
  <div class="dpad-btn" id="btn-right">▶</div>

  <div></div>
  <div class="dpad-btn" id="btn-down">▼</div>
  <div></div>
</div>

<script>
(function(){
  const canvas  = document.getElementById('game');
  const ctx     = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const ovTitle = document.getElementById('ov-title');
  const ovMsg   = document.getElementById('ov-msg');
  const ovScore = document.getElementById('ov-score');
  const ovBtn   = document.getElementById('ov-btn');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best-score');
  const levelEl = document.getElementById('level-val');
  const pauseBtn= document.getElementById('pause-btn');

  // ── size the canvas to available space ──
  const CELL = 18;
  function sizeCanvas(){
    const wrap = document.getElementById('canvas-wrap');
    const maxW = Math.min(window.innerWidth - 16, 400);
    const availH = window.innerHeight
      - document.querySelector('header').offsetHeight
      - document.getElementById('dpad').offsetHeight
      - 60; // gaps+padding
    const cols = Math.floor(Math.min(maxW, availH) / CELL);
    const px   = cols * CELL;
    canvas.width  = px;
    canvas.height = px;
    wrap.style.width  = px + 'px';
    wrap.style.height = px + 'px';
    return cols;
  }

  let COLS = sizeCanvas();
  let ROWS = COLS;

  // ── state ──
  let snake, dir, nextDir, food, score, best, level, speed, loop, running, paused;
  best = parseInt(localStorage.getItem('snakeBest')||'0');
  bestEl.textContent = best;

  function initGame(){
    COLS = sizeCanvas(); ROWS = COLS;
    const mid = Math.floor(COLS/2);
    snake   = [{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];
    dir     = {x:1,y:0};
    nextDir = {x:1,y:0};
    food    = spawnFood();
    score   = 0; level = 1; speed = 160;
    scoreEl.textContent = 0;
    levelEl.textContent = 1;
    running = true; paused = false;
    pauseBtn.textContent = '⏸';
  }

  function spawnFood(){
    let pos;
    do {
      pos = { x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS) };
    } while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
    return pos;
  }

  // ── drawing ──
  const GREEN     = '#39ff14';
  const GREEN_DIM = '#1a7a08';
  const HEAD_CLR  = '#80ff50';
  const FOOD_CLR  = '#ff3860';

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // grid dots
    ctx.fillStyle = '#151520';
    for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++){
      ctx.fillRect(x*CELL+CELL/2-1, y*CELL+CELL/2-1, 2, 2);
    }

    // food (pulsing handled via glow)
    const t = Date.now()/400;
    const glow = 4 + 3*Math.sin(t);
    ctx.save();
    ctx.shadowColor = FOOD_CLR;
    ctx.shadowBlur  = glow;
    ctx.fillStyle   = FOOD_CLR;
    roundRect(ctx, food.x*CELL+2, food.y*CELL+2, CELL-4, CELL-4, 4);
    ctx.fill();
    // apple shine
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(food.x*CELL+6, food.y*CELL+5, 3, 2, -0.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // snake body
    snake.forEach((seg, i)=>{
      const isHead = i===0;
      const ratio  = 1 - i/(snake.length+1)*0.55;
      ctx.save();
      ctx.shadowColor = GREEN;
      ctx.shadowBlur  = isHead ? 10 : 4;
      ctx.fillStyle   = isHead ? HEAD_CLR : `rgba(${57+ratio*30},${Math.floor(255*ratio)},${Math.floor(20*ratio)},1)`;
      roundRect(ctx, seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, isHead?5:3);
      ctx.fill();
      ctx.restore();

      // eyes on head
      if(isHead){
        ctx.fillStyle='#001';
        const ex = dir.x, ey = dir.y;
        const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
        const off = 4;
        const perp = {x:-dir.y,y:dir.x};
        [[1],[-1]].forEach(([s])=>{
          ctx.beginPath();
          ctx.arc(cx + ex*off + perp.x*s*3, cy + ey*off + perp.y*s*3, 1.8, 0, Math.PI*2);
          ctx.fill();
        });
      }
    });
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
    ctx.closePath();
  }

  // ── update ──
  function update(){
    if(!running||paused) return;
    dir = {...nextDir};
    const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};

    // wall collision
    if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){ gameOver(); return; }
    // self collision
    if(snake.some(s=>s.x===head.x&&s.y===head.y)){ gameOver(); return; }

    snake.unshift(head);

    if(head.x===food.x&&head.y===food.y){
      score += level * 10;
      scoreEl.textContent = score;
      if(score>best){ best=score; bestEl.textContent=best; localStorage.setItem('snakeBest',best); }
      const newLevel = Math.floor(score/100)+1;
      if(newLevel>level){ level=newLevel; levelEl.textContent=level; speed=Math.max(60,160-level*18); }
      food = spawnFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function gameOver(){
    running=false;
    clearInterval(loop);
    // flash
    let n=0; const flash=setInterval(()=>{
      ctx.fillStyle=`rgba(255,56,96,${n%2?0.1:0})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      if(++n>5){ clearInterval(flash); showOverlay('GAME OVER','',score,'REINTENTAR'); }
    },80);
  }

  function showOverlay(title,msg,sc,btnTxt){
    ovTitle.textContent = title;
    ovMsg.textContent   = msg;
    if(sc!==null){ ovScore.textContent='SCORE: '+sc; ovScore.style.display='block'; }
    else { ovScore.style.display='none'; }
    ovBtn.textContent   = btnTxt;
    overlay.classList.remove('hidden');
  }

  ovBtn.addEventListener('click',()=>{
    overlay.classList.add('hidden');
    clearInterval(loop);
    initGame();
    draw();
    loop = setInterval(update, speed);
  });

  pauseBtn.addEventListener('click',togglePause);
  function togglePause(){
    if(!running) return;
    paused=!paused;
    pauseBtn.textContent = paused?'▶':'⏸';
    if(paused) showOverlay('PAUSA','',null,'CONTINUAR');
    else overlay.classList.add('hidden');
  }

  // ── D-PAD ──
  const dirMap = {
    'btn-up':   {x:0,y:-1}, 'btn-down': {x:0,y:1},
    'btn-left': {x:-1,y:0}, 'btn-right':{x:1,y:0}
  };
  Object.entries(dirMap).forEach(([id,d])=>{
    const el = document.getElementById(id);
    function press(e){
      e.preventDefault();
      if(!running||paused) return;
      if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
      el.classList.add('pressed');
      setTimeout(()=>el.classList.remove('pressed'),120);
    }
    el.addEventListener('touchstart',press,{passive:false});
    el.addEventListener('mousedown', press);
  });

  // ── SWIPE ──
  let tx0,ty0;
  canvas.addEventListener('touchstart',e=>{
    tx0=e.touches[0].clientX; ty0=e.touches[0].clientY;
  },{passive:true});
  canvas.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx0;
    const dy=e.changedTouches[0].clientY-ty0;
    if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
    let d;
    if(Math.abs(dx)>Math.abs(dy)) d=dx>0?{x:1,y:0}:{x:-1,y:0};
    else                           d=dy>0?{x:0,y:1}:{x:0,y:-1};
    if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
  },{passive:true});

  // ── KEYBOARD ──
  document.addEventListener('keydown',e=>{
    const map={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0}};
    if(map[e.key]){
      e.preventDefault();
      const d=map[e.key];
      if(d.x!==-dir.x||d.y!==-dir.y) nextDir=d;
    }
    if(e.key===' '||e.key==='Escape') togglePause();
  });

  // ── INIT ──
  initGame();
  draw();
  showOverlay('🐍 SNAKE','Desliza o usa el D-Pad\npara mover la serpiente',null,'JUGAR');
})();
</script>
</body>
</html>
